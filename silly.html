<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie Ratings</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>Movies and Ratings</h1>

  <!-- Form to add characters -->
  <form id="moviesForm">
    <label for="key">Movie Key</label>
    <input type="text" id="key" required>

    <label for="movie">Movie Name</label>
    <input type="text" id="movie" required>

    <label for="year">Year</label>
    <input type="number" id="year" required>

   <select name="genre" id="genre">
  <option value="idk">Not Sure</option>
  <option value="horror">Horror</option>
  <option value="rom">Comedy</option>
  <option value="act">Action</option>
  <option value="sci">Sci-Fi</option>
</select>

    <button type="submit">Rate A Movie!</button>
  </form>

  <!-- Display list -->
  <div class="movierating-list" id="movieList"></div>

  <script src="script.js">
    
  </script>
</body>
</html>
